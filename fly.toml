# fly.toml app configuration file
#
# DATABASE_URL must be set via `fly secrets set DATABASE_URL=postgres://...`
# SESSION_SECRET must be set via `fly secrets set SESSION_SECRET=$(openssl rand -hex 32)`
# RESEND_API_KEY must be set via `fly secrets set RESEND_API_KEY=...`
#
# See https://fly.io/docs/reference/configuration/

app = 'ncu'
primary_region = 'lax'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '8080'

# Legacy volume from the SQLite era. Kept mounted (but unused by the app)
# so existing machines don't fail the deploy reconciliation. Safe to remove
# along with the volume itself in a follow-up: `fly volumes destroy arf_data`.
[[mounts]]
  source = 'arf_data'
  destination = '/data'
  processes = ['app']

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '512mb'
  cpus = 1
