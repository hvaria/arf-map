services:
  - type: web
    name: arf-map
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /data
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
